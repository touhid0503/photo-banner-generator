<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Banner Result</title>

    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: Arial, sans-serif;
            background: #f2f4f7;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            background: white;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 900px;
            text-align: center;
        }

        h2 {
            margin-bottom: 20px;
            color: #333;
        }

        /* Canvas responsive */

        .canvas-wrapper {
            width: 100%;
            overflow: hidden;
        }

        canvas {
            width: 100%;
            height: auto;
            border: 2px solid #1a8a5f;
            border-radius: 8px;
            background: white;
        }

        /* Buttons */

        .buttons {
            margin-top: 20px;
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .btn {
            padding: 12px 25px;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            font-size: 16px;
        }

        .download {
            background: #1a8a5f;
            color: white;
        }

        .back {
            background: #555;
            color: white;
        }

        .btn:hover {
            opacity: 0.9;
        }

        /* Mobile */

        @media (max-width:600px) {

            .container {
                padding: 20px;
            }

            .btn {
                width: 100%;
            }

        }

        /* Tablet */

        @media (min-width:601px) and (max-width:900px) {

            .container {
                max-width: 700px;
            }

        }

        /* Desktop */

        @media (min-width:901px) {

            .container {
                max-width: 900px;
            }

        }
    </style>
</head>

<body>

    <div class="container">

        <h2>Your Banner Preview</h2>

        <div class="canvas-wrapper">
            <canvas id="bannerCanvas" width="1200" height="628"></canvas>
        </div>

        <div class="buttons">
            <!-- <button id="downloadBtn" class="btn download">Download Banner</button> -->
            <button onclick="window.location.href='index.html'" class="btn back">Back</button>
        </div>

    </div>

    <script>

        const canvas = document.getElementById("bannerCanvas");
        const ctx = canvas.getContext("2d");

        const template = new Image();
        const user = new Image();

        const userPhoto = localStorage.getItem("userPhoto");

        if (!userPhoto) {
            alert("No image found!");
            window.location.href = "index.html";
        }

        template.src = "template.jpg";
        user.src = userPhoto;

        Promise.all([
            new Promise(resolve => template.onload = resolve),
            new Promise(resolve => user.onload = resolve)
        ]).then(() => {

            ctx.drawImage(template, 0, 0, 1200, 628);

            /* user photo position */
            ctx.drawImage(user, 475, 248, 250, 250);

        });

        document.getElementById("downloadBtn").addEventListener("click", () => {

            const image = canvas.toDataURL("image/png");

            const link = document.createElement("a");
            link.download = "banner.png";
            link.href = image;

            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);

        });

    </script>

</body>

</html>
